# configs/local-ollama.yaml
pipeline:
  chat:
    model: "gemini-3-pro-preview"
    provider: "google_genai"
    temperature: 0.0
    max_tokens: 8096
  embeddings:
    model: "qwen3-embedding:0.6b"
    provider: "ollama"
    base_url: "http://localhost:11434"

eval:
  llm:
    model: "gpt-4o-mini"
    provider: "openai"
  embeddings:
    model: "text-embedding-3-small"
    provider: "openai"

retrieval:
  top_k: 5
  similarity_threshold: null
  reranker: "none"
